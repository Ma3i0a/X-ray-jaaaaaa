<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chest X-Ray Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; box-sizing: border-box; }
        h2 { color: #1a73e8; margin-top: 0; }
        
        /* ส่วนแสดงสถานะ */
        #status { padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        .ok { background: #e6f4ea; color: #1e8e3e; border: 1px solid #34a853; }
        .err { background: #fce8e6; color: #d93025; border: 1px solid #ea4335; }

        /* ส่วนอัปโหลด */
        .upload-zone { border: 2px dashed #1a73e8; padding: 30px; border-radius: 15px; cursor: pointer; transition: 0.3s; background: #f8fbff; margin-bottom: 20px; }
        .upload-zone:hover { background: #e8f0fe; border-color: #1557b0; }
        #image-preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ddd; }

        /* ส่วนผลลัพธ์ */
        .result-item { margin-top: 20px; text-align: left; }
        .bar-label { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 5px; }
        .bar-bg { background: #eee; border-radius: 10px; height: 18px; width: 100%; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }

        /* ส่วนคำเตือน */
        .medical-disclaimer { margin-top: 30px; padding: 15px; background-color: #fff4e5; border-left: 5px solid #ff9800; border-radius: 8px; text-align: left; font-size: 12px; color: #663c00; }
        .disclaimer-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #e65100; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔍 วิเคราะห์ภาพ X-ray</h2>
    <div id="status" class="status err">⏳ กำลังเชื่อมต่อระบบ AI...</div>

    <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="predict(event)">
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <strong>📁 คลิกเพื่อเลือกรูปภาพ</strong><br>
        <span style="font-size: 12px; color: #5f6368;">(รองรับเฉพาะไฟล์รูปภาพปอด X-ray)</span>
    </div>

    <img id="image-preview">
    <div id="result-container"></div>

    <div class="medical-disclaimer">
        <div class="disclaimer-title">⚠️ ข้อกำหนดและคำเตือน</div>
        <div>• ระบบนี้เป็นส่วนหนึ่งของโครงงานศึกษาเท่านั้น</div>
        <div>• ผลลัพธ์จาก AI <b>ไม่สามารถใช้แทนการวินิจฉัยของแพทย์ได้</b></div>
        <div>• หากท่านมีอาการผิดปกติ โปรดปรึกษาแพทย์ผู้เชี่ยวชาญทันที</div>
    </div>
</div>

<script>
    const URL = "./"; 
    let model;

    // โหลดโมเดล
    async function init() {
        try {
            // ป้องกันการจำค่าเก่าด้วยการเติม timestamp
            const t = new Date().getTime();
            model = await tmImage.load(URL + "model.json?v=" + t, URL + "metadata.json?v=" + t);
            document.getElementById("status").innerText = "✅ AI พร้อมทำงานแล้ว";
            document.getElementById("status").className = "status ok";
        } catch (e) {
            document.getElementById("status").innerText = "❌ โหลดโมเดลไม่สำเร็จ (เช็คไฟล์ในโฟลเดอร์)";
            document.getElementById("status").className = "status err";
        }
    }

    // ประมวลผลรูปภาพ
    async function predict(event) {
        const file = event.target.files[0];
        if (!file) return;

        const img = document.getElementById("image-preview");
        img.src = window.URL.createObjectURL(file);
        img.style.display = "block";

        img.onload = async () => {
            const prediction = await model.predict(img);
            showResults(prediction);
        };
    }

    // แสดงผลและแยกสี
    function showResults(results) {
        const container = document.getElementById("result-container");
        container.innerHTML = "";

        results.forEach(res => {
            const prob = (res.probability * 100).toFixed(2);
            const name = res.className.toLowerCase().trim();
            
            let color = "#bdc1c6"; // สีเทาเริ่มต้น

            // เช็คชื่อคลาสเพื่อกำหนดสี (รองรับ Normal / Abnormal / Adnomal)
            if (name.includes("norm")) {
                color = "#28a745"; // เขียว
            } else if (name.includes("ab") || name.includes("ad") || name.includes("ไม่")) {
                color = "#dc3545"; // แดง
            }

            container.innerHTML += `
                <div class="result-item">
                    <div class="bar-label">
                        <span>${res.className}</span>
                        <span>${prob}%</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" style="width: ${prob}%; background-color: ${color};"></div>
                    </div>
                </div>
            `;
        });
    }

    init();
</script>

</body>
</html>
